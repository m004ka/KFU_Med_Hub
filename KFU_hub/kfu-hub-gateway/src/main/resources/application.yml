server:
  port: 8080

spring:
  application:
    name: kfu-hub-gateway

  config:
    import: "vault://secret/kfu-hub/gateway"

  cloud:
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: http
      authentication: TOKEN
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret

    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods: ["GET","POST","PUT","PATCH","DELETE","OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        - id: dataset-service
          uri: http://${DATASET_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/datasets/**
          filters:
            - name: CircuitBreaker
              args:
                name: dataset-cb
                fallbackUri: forward:/fallback/dataset
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1

        - id: ai-gateway-service
          uri: http://${AI_GATEWAY_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - name: CircuitBreaker
              args:
                name: ai-cb
                fallbackUri: forward:/fallback/ai
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: integration-service
          uri: http://${INTEGRATION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/integration/**
          filters:
            - name: CircuitBreaker
              args:
                name: integration-cb
                fallbackUri: forward:/fallback/integration

        - id: projects-service
          uri: http://${PROJECTS_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/projects/**
          filters:
            - name: CircuitBreaker
              args:
                name: projects-cb
                fallbackUri: forward:/fallback/projects

        - id: notifications-service
          uri: http://${NOTIFICATIONS_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/notifications/**

        - id: audit-service
          uri: http://${AUDIT_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/v1/audit/**

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/kfu-hub}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    ru.kfu.hub: DEBUG
    org.springframework.cloud.gateway: INFO
