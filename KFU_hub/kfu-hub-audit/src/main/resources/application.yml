server:
  port: 8087

spring:
  application:
    name: kfu-hub-audit

  config:
    import: "vault://secret/kfu-hub/audit"

  cloud:
    vault:
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: http
      authentication: TOKEN
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kfu_hub}?currentSchema=audit
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: audit-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: audit
        # Партиционирование — управляется через Liquibase, не Hibernate
        hbm2ddl.auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: audit

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: kfu-hub-audit
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      # Отдельный consumer для каждого топика, чтобы не терять события
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "ru.kfu.hub.*"

audit:
  retention-years: 3
  kafka:
    topics:
      # Слушаем аудит-события от всех сервисов
      - kfu.hub.audit.event
  partition:
    # Создавать партицию на каждый месяц (управляется через scheduled job)
    strategy: MONTHLY

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    ru.kfu.hub: DEBUG
